[build]
  command    = "npm run build"
  publish    = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory     = "netlify/functions"
  node_bundler  = "esbuild"

[functions."slack-reminders"]
  schedule = "0 9 * * *"

[functions."email-reminders"]
  schedule = "0 9 * * *"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Local dev server settings
[dev]
  command    = "npm run dev"
  targetPort = 3000
  autoLaunch = false
